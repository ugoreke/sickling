# Multimodal classifier — image (DINOv2 frozen, timm ViT, or MAE-init) + morphology.
# Override the image encoder via --image-variant on the CLI.

training:
  batch_size: 64
  max_epochs: 30
  warmup_epochs: 3
  weight_decay: 0.05

finetune:
  head_lr: 1.0e-3
  backbone_lr: 1.0e-4
  llrd: 0.65
  minority_frac: 0.5

multimodal:
  fusion_hidden: 256
  dropout: 0.3
  num_classes: 2
