# Tiny override for smoke-testing the linear-probe / finetune Lightning modules.
# Used with `sickling finetune dinov2_frozen --synth-labels -c configs/smoke_finetune.yaml`.
training:
  precision: 32-true
  batch_size: 32
  max_epochs: 2
  warmup_epochs: 0
  num_workers: 0

finetune:
  head_lr: 1.0e-3
  minority_frac: 0.5
